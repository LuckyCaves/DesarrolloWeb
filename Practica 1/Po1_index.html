<!doctype html>
<html lang="en">
	<head>
		<title>Home</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
		<link rel="stylesheet" href="styles/Po1_index.css">

		<!-- Bootstrap CSS v5.2.1 -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
			crossorigin="anonymous"
		/>

		<script src="https://kit.fontawesome.com/50b8111978.js" crossorigin="anonymous"></script>
	</head>

	<body>
		<header>
			<nav class="navbar navbar-expand-sm navbar-dark">
				<div class="container-fluid">
					<a class="navbar-brand" href="javascript:void(0)">Logo</a>
					<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarListContainer">
						<span class="navbar-toggler-icon"></span>
					</button>
					<div class="collapse navbar-collapse" id="navbarListContainer">
						<ul class="navbar-nav me-auto" id="lista">
							<li class="nav-item">
								<a class="nav-link" href="javascript:void(0)">Inicio</a>
							</li>
							<li class="nav-item">
								<a class="nav-link" href="javascript:void(0)">Sobre Nosotros</a>
							</li>
							<li class="nav-item dropdown">
								<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Productos</a>
								<ul class="dropdown-menu">
									<li><a class="dropdown-item" href="#">Link</a></li>
									<li><a class="dropdown-item" href="#">Another link</a></li>
									<li><a class="dropdown-item" href="#">A third link</a></li>
								</ul>
							</li> 
							<form class="d-flex" id="searchForm">
								<input id="searchBar" type="text" placeholder="Buscar Productos">
								<button id="searchButton" type="button">
									<i class="fa-solid fa-magnifying-glass fa-lg fa-spin" style="color: #b5d99c;"></i>
								</button>
							</form>
						</ul>
						<div class="d-flex" id="navbarRightSide">
							<a href="">
								<i class="fa-solid fa-user fa-lg fa-spin" style="color: #b5d99c;"></i>
							<a href="">
								<i class="fa-solid fa-cart-shopping fa-lg fa-spin" style="color: #b5d99c;"></i>
							</a>
						</div>
					</div>
				</div>
			</nav> 
		</header>
		<main>
			<div id="carouselId" class="carousel slide" data-bs-ride="carousel">
				<ol class="carousel-indicators">
					<li data-bs-target="#carouselId" data-bs-slide-to="0" class="active" aria-current="true" aria-label="First slide"></li>
					<li data-bs-target="#carouselId" data-bs-slide-to="1" aria-label="Second slide"></li>
					<li data-bs-target="#carouselId" data-bs-slide-to="2" aria-label="Third slide"></li>
				</ol>
				<div class="carousel-inner" role="listbox">
					<div class="carousel-item active">
						<img src="images/blueLandscape.jpeg" class="w-100 d-block" alt="First slide">
					</div>
					<div class="carousel-item">
						<img src="images/mountainsLandscape.png" class="w-100 d-block" alt="Second slide">
					</div>
					<div class="carousel-item">
						<img src="images/winterLandscape.jpg" class="w-100 d-block" alt="Third slide">
					</div>
				</div>
				<button class="carousel-control-prev" type="button" data-bs-target="#carouselId" data-bs-slide="prev">
					<span class="carousel-control-prev-icon" aria-hidden="true"></span>
					<span class="visually-hidden">Previous</span>
				</button>
				<button class="carousel-control-next" type="button" data-bs-target="#carouselId" data-bs-slide="next">
					<span class="carousel-control-next-icon" aria-hidden="true"></span>
					<span class="visually-hidden">Next</span>
				</button>
			</div>
			
		</main>
		<footer>
			<!-- place footer here -->
		</footer>
		<!-- Bootstrap JavaScript Libraries -->
		<script
			src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
			integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
			crossorigin="anonymous"
		></script>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
			integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
			crossorigin="anonymous"
		></script>
	</body>
</html>
